{% extends "base.html" %}

{% block title %}排行榜 - Video Crawler{% endblock %}
{% block nav_rankings %}active{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="mb-0 fw-bold"><i class="bi bi-trophy me-2"></i>排行榜</h4>
    <div class="d-flex align-items-center gap-2">
        <label class="form-label mb-0 small text-muted">分区:</label>
        <select class="form-select form-select-sm" id="categorySelect" style="width:auto">
            {% for key, label in categories.items() %}
            <option value="{{ key }}" {% if key == 'all' %}selected{% endif %}>{{ label }}</option>
            {% endfor %}
        </select>
    </div>
</div>

<div class="card">
    <div class="card-header bg-white border-0 py-3 d-flex justify-content-between align-items-center">
        <h6 class="mb-0" id="snapshotInfo">
            <i class="bi bi-clock me-1"></i>加载中...
        </h6>
        <span class="badge bg-primary" id="entryCount"></span>
    </div>
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table table-hover mb-0 align-middle">
                <thead class="table-light">
                    <tr>
                        <th style="width:60px">排名</th>
                        <th style="width:100px"></th>
                        <th>标题</th>
                        <th>UP主</th>
                        <th class="text-end" style="min-width:180px">综合得分</th>
                    </tr>
                </thead>
                <tbody id="rankingBody">
                    <tr>
                        <td colspan="5" class="text-center text-muted py-5">
                            <div class="spinner-border text-primary"></div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/rankings.js"></script>
{% endblock %}
